[pytest]
# Local config so pytest uses this file instead of /app/pyproject.toml inside
# the litellm container. That pyproject sets `asyncio_mode = auto` for
# pytest-asyncio, which we don't install — we use plain `asyncio.run()`
# inside the tests (see `_run()` in test_message_overflow.py). Without this
# file pytest would warn `Unknown config option: asyncio_mode` on every run.
